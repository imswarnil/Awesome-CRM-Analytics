---
layout: base
description: Default template for pages and posts, with contained width.
---
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "description": "{{ page.description | escape }}",
  "mainEntity": {
    "@type": "WebPageElement",
    "name": "{{ page.title | escape }}",
    "headline": "{{ page.title | escape }}",
    "text": "{{ content | strip_html | escape }}"
  },
  "url": "{{ page.url | absolute_url }}",
  "isPartOf": {
    "@type": "Website",
    "name": "{{ site.title | escape }}",
    "url": "{{ site.url | absolute_url }}"
  }
}
</script>

<div class="slds-grid slds-wrap">
  {% if page.toc %}
  <div class="slds-col slds-size_10-of-12 slds-medium-size_4-of-12 slds-large-size_3-of-12 slds-mx-auto">
    <div class="toc">
      <h6>On this page</h6>
      {% include toc.html
        html=content
        sanitize=true
        h_min=2
        h_max=3
      %}
    </div>
  </div>
  {% endif %}
  <div class="slds-col slds-size_10-of-12 slds-medium-size_8-of-12 slds-large-size_9-of-12 slds-order_1 slds-mx-auto">

    {{ content }}

    {% if page.comments %}
      <div id="disqus_thread"></div>
      <script>
        // Configuration variables: https://disqus.com/admin/universalcode/#configuration-variables
        var disqus_config = function () {
          this.page.url = "{{ page.url | absolute_url }}";
        };
        (function() { // Don't edit below this line
          var d = document, s = d.createElement("script");
          s.src = "https://{{ site.social.disqus }}.disqus.com/embed.js";
          s.setAttribute("data-timestamp", +new Date());
          (d.head || d.body).appendChild(s);
        })();
      </script>
      <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" rel="nofollow">comments powered by Disqus.</a></noscript>
    {% endif %}
  </div>
</div>
